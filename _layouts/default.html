<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>{% if page.title %}{{ page.title }} — {% endif %}{{ site.title }}</title>
<style>
  :root {
    --bg: #ffffff;
    --bg-secondary: #f6f8fa;
    --border: #d0d7de;
    --text: #1f2328;
    --text-secondary: #656d76;
    --heading: #1f2328;
    --link: #0969da;
    --link-hover: #0550ae;
    --code-bg: #f6f8fa;
    --code-text: #1f2328;
    --blockquote-border: #d0d7de;
    --table-border: #d0d7de;
    --table-alt: #f6f8fa;
    --selection: rgba(9,105,218,0.3);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0d1117;
      --bg-secondary: #161b22;
      --border: #30363d;
      --text: #c9d1d9;
      --text-secondary: #8b949e;
      --heading: #e6edf3;
      --link: #58a6ff;
      --link-hover: #79c0ff;
      --code-bg: #161b22;
      --code-text: #c9d1d9;
      --blockquote-border: #30363d;
      --table-border: #21262d;
      --table-alt: #161b22;
      --selection: rgba(56,139,253,0.3);
    }
  }
  * { box-sizing: border-box; }
  ::selection { background: var(--selection); }
  html { font-size: 16px; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans", Helvetica, Arial, sans-serif;
    line-height: 1.6;
    color: var(--text);
    background: var(--bg);
    margin: 0;
    padding: 0;
  }
  .container {
    max-width: 1012px;
    margin: 0 auto;
    padding: 32px 24px;
  }
  .site-header {
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    background: var(--bg-secondary);
  }
  .site-header .inner {
    max-width: 1012px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    gap: 24px;
  }
  .site-header h1 {
    margin: 0;
    font-size: 1.1em;
    font-weight: 600;
  }
  .site-header h1 a {
    color: var(--heading);
    text-decoration: none;
  }
  .site-header h1 a:hover { color: var(--link-hover); }
  .site-header nav {
    display: flex;
    gap: 16px;
    font-size: 0.9em;
  }
  .site-header nav a {
    color: var(--text-secondary);
    text-decoration: none;
  }
  .site-header nav a:hover { color: var(--link); }
  h1, h2, h3, h4, h5, h6 {
    color: var(--heading);
    font-weight: 600;
    margin-top: 24px;
    margin-bottom: 16px;
  }
  h1 { font-size: 2em; border-bottom: 1px solid var(--border); padding-bottom: 0.3em; }
  h2 { font-size: 1.5em; border-bottom: 1px solid var(--border); padding-bottom: 0.3em; }
  h3 { font-size: 1.25em; }
  a { color: var(--link); text-decoration: none; }
  a:hover { color: var(--link-hover); text-decoration: underline; }
  p { margin-top: 0; margin-bottom: 16px; }
  ul, ol { margin-top: 0; margin-bottom: 16px; padding-left: 24px; }
  li { margin-bottom: 4px; }
  code {
    font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
    background: var(--code-bg);
    color: var(--code-text);
    font-size: 85%;
    padding: 0.2em 0.4em;
    border-radius: 6px;
  }
  pre {
    background: var(--code-bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 16px;
    overflow-x: auto;
    line-height: 1.45;
  }
  pre code {
    background: transparent;
    padding: 0;
    font-size: 85%;
  }
  blockquote {
    margin: 0 0 16px 0;
    padding: 0 1em;
    color: var(--text-secondary);
    border-left: 0.25em solid var(--blockquote-border);
  }
  table {
    border-collapse: collapse;
    width: 100%;
    margin-bottom: 16px;
  }
  table th, table td {
    border: 1px solid var(--table-border);
    padding: 8px 12px;
    text-align: left;
  }
  table tr:nth-child(even) { background: var(--table-alt); }
  table th { font-weight: 600; }
  img { max-width: 100%; }
  hr {
    border: none;
    border-top: 1px solid var(--border);
    margin: 24px 0;
  }
  .site-footer {
    border-top: 1px solid var(--border);
    padding: 16px 24px;
    margin-top: 48px;
    font-size: 0.85em;
    color: var(--text-secondary);
    text-align: center;
  }
  @media (max-width: 600px) {
    .site-header .inner { flex-direction: column; gap: 8px; }
  }
</style>
</head>
<body>

<div class="site-header">
  <div class="inner">
    <h1><a href="/portfolio/">{{ site.title }}</a></h1>
    <nav>
      <a href="/portfolio/">Home</a>
      <a href="/portfolio/leadership/strategy">Strategy</a>
      <a href="/portfolio/leadership/metrics">Metrics</a>
      <a href="/portfolio/leadership/ai-tools-eval">AI Tools</a>
      <a href="/portfolio/projects/buzzhive">Buzzhive</a>
      <a href="/portfolio/projects/orangehrm">OrangeHRM</a>
      <a href="/portfolio/projects/dora-systems">DORA</a>
    </nav>
  </div>
</div>

<div class="container">
  {{ content }}
</div>

<div class="site-footer">
  Victor Ematin · QA/Test Lead · <a href="https://github.com/victor-2026">github.com/victor-2026</a>
</div>

</body>
</html>
